# Dev test — StmtHead loop baseline (cloud: RTX 5060 Ti 16GB)
# Run (cloud):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/dev/test_stmthead_loop.yaml
# Compare epoch time against test_stmthead_vec.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  live_lm: none
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 1
  batch_size: 32              # safe for 16GB VRAM (matches A1)
  lr: 0.001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 999
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
  use_amp: true
  use_flash_attention: false
  grad_accum_steps: 1
  save_last_every: 0
  compile_model: false
  stmt_head_vectorized: false
  num_workers: 4
  prefetch_factor: 2
