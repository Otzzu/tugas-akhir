# configs/lmgat_graphcodebert/multiclass.yaml — Architecture 3 variant: LM-GAT + GraphCodeBERT
#
# Same as lmgat_codebert/multiclass.yaml but uses GraphCodeBERT node embeddings.
# GraphCodeBERT trained on code structure (data flow) — potentially better node embeddings.
#
# Run:
#   uv run train --config configs/lmgat_graphcodebert/multiclass.yaml

data:
  mode: multiclass
  max_nodes: 1000

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/graphcodebert-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 11
  mil_weight: 0.5
  mil_k: 3
  rank_loss_weight: 0.2

train:
  seed: 42
  epochs: 100
  batch_size: 4
  lr: 0.001
  lm_lr: 0.00002
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
