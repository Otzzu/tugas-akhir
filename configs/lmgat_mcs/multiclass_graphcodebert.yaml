# configs/lmgat_mcs/multiclass_graphcodebert.yaml — Arch 4 with GraphCodeBERT
#
# Same as multiclass.yaml but uses GraphCodeBERT instead of CodeBERT.
# Uses existing lm_dataset_multiclass_graphcodebert-base_ft.pt on cloud.
#
# Run:
#   python -m gnn_vuln.train --config configs/lmgat_mcs/multiclass_graphcodebert.yaml

data:
  mode: multiclass
  max_nodes: 1000

model:
  architecture: lmgat_mcs
  pretrained_lm: microsoft/graphcodebert-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 11
  mil_weight: 0.5
  mil_k: 3
  rank_loss_weight: 0.0

train:
  seed: 42
  epochs: 100
  batch_size: 16
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 20
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
