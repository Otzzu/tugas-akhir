# configs/lmgat_interp/binary_graphcodebert.yaml — LM-GAT-Interp binary + frozen GraphCodeBERT
#
# Explicit VulLMGNN interpolation (Cao et al. 2022):
#   pred = λ * logit_gnn + (1-λ) * logit_lm
# Binary: benign (0) vs vulnerable (1).
#
# Run:
#   uv run train --config configs/lmgat_interp/binary_graphcodebert.yaml

data:
  mode: binary
  max_nodes: 1000

model:
  architecture: lmgat_interp
  pretrained_lm: microsoft/graphcodebert-base
  add_func_tokens: true           # required — func_input_ids needed by LM branch
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 2
  mil_weight: 0.5
  mil_k: 5
  rank_loss_weight: 0.3
  init_lambda: 0.5

train:
  seed: 42
  epochs: 100
  batch_size: 8
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 20
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
