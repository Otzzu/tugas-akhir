# configs/lmgat_codebert/multiclass_mtl_livable.yaml — MTL + LIVABLE adaptive class weights
#
# Same as multiclass_mtl.yaml but with LIVABLE epoch-adaptive class weights enabled.
# LIVABLE: w_i(t) = (N/(K*n_i))^(t/T) — starts uniform, anneals to inverse-freq by epoch T.
#
# Loss = LIVABLE_CE(cwe) + binary_loss_weight * CE(binary) + mil_weight * MIL(stmt_scores)
#
# Requires Data objects with:
#   batch.y        — CWE class ID (0=benign)
#
# Tuned for RTX 4090 24GB.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_codebert/multiclass_mtl_livable.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert_mtl
  pretrained_lm: microsoft/unixcoder-base # must match PT: lm_dataset_bigvul_multiclass_unixcoder-base_ft_top10.pt
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11 # fine-grained: 10 CWE + benign
  num_groups: 16 # coarse: 15 CWE groups + benign
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2 # set >0 only with flaw_line_mask (BigVul/MegaVul)
  use_group_cond: true # false = no group PT; cwe_head gets zeros instead of random group probs
  group_loss_weight: 0.3 # 0.0 = no group_id in existing PT
  binary_loss_weight: 0.2 # binary label derived from batch.y > 0, always available
  add_self_loops: true   # node attends to itself inside GAT aggregation
  use_skip: true         # residual skip around each GATv2 layer; preserves CodeBERT node features
  use_edge_emb: true     # hierarchical trainable edge embeddings (coarse group + fine type)
  edge_emb_dim: 32       # fine-grained edge type embedding dim (AST/CFG/CDG/DDG/PDG/CALL/REACHING_DEF)
  edge_coarse_dim: 16    # coarse group embedding dim (structural/control/data)

train:
  seed: 42
  epochs: 100
  batch_size: 20 # RTX 4090 24GB: single GATv2 stack; reduce to 12 if OOM
  lr: 0.001
  lm_lr: 0.00001 # AdamW separate LR for UniXcoder branch
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  save_last_every: 0  # 0=never save last.pt (no resume); N=every N epochs
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true # LIVABLE epoch-adaptive class weights enabled
  device: cuda
