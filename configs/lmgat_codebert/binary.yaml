# configs/lmgat_codebert/binary.yaml — Architecture 3: LM-GAT v2 + Live Fine-tuned CodeBERT
#
# What's new vs lmgat/binary.yaml:
#   - add_func_tokens: true — tokenizes full function text into Data objects
#   - live CodeBERT branch: func_head gets concat(GNN pooled, CodeBERT CLS)
#   - AdamW with two param groups: CodeBERT lr=2e-5, GNN lr=1e-3
#   - linear warmup (10%) + decay replaces ReduceLROnPlateau
#   - grad_clip 1.0: prevents CodeBERT gradient explosions
#   - batch_size 8: reduced from 16 to fit live CodeBERT in VRAM
#
# Run:
#   uv run train --config configs/lmgat_codebert/binary.yaml

data:
  mode: binary
  max_nodes: 1000

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/codebert-base   # swap to microsoft/graphcodebert-base for GraphCodeBERT
  add_func_tokens: true                    # required: enables func_input_ids in Data objects
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 2
  mil_weight: 0.5
  mil_k: 5
  rank_loss_weight: 0.3

train:
  seed: 42
  epochs: 100
  batch_size: 8             # reduced from 16: live CodeBERT adds ~2-3 GB VRAM per batch
  lr: 0.001                 # GNN param group learning rate
  lm_lr: 0.00002            # CodeBERT learning rate (2e-5)
  warmup_ratio: 0.1         # 10% of total steps for linear warmup
  grad_clip: 1.0            # gradient clipping max norm (prevents CodeBERT explosions)
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  device: cuda
