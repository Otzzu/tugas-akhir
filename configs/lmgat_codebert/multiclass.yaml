# configs/lmgat_codebert/multiclass.yaml — Architecture 3: LM-GAT v2 + Live Fine-tuned CodeBERT
#
# What's new vs lmgat/multiclass.yaml:
#   - add_func_tokens: true — tokenizes full function text into Data objects
#   - live CodeBERT branch: func_head gets concat(GNN pooled, CodeBERT CLS)
#   - AdamW with two param groups: CodeBERT lr=2e-5, GNN lr=1e-3
#   - linear warmup (10%) + decay replaces ReduceLROnPlateau
#   - grad_clip 1.0: prevents CodeBERT gradient explosions
#   - batch_size 4: reduced from 6 to fit live CodeBERT + multiclass in VRAM
#
# Data layout expected:
#   data/raw/benign/          <- CPG .json files (class_id=0)
#   data/raw/vulnerable/      <- CPG .json files with .meta.json sidecars
#   data/raw/cwe_vocab.json   <- REQUIRED
#
# Run:
#   uv run train --config configs/lmgat_codebert/multiclass.yaml

data:
  mode: multiclass
  max_nodes: 1000

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/codebert-base   # swap to microsoft/graphcodebert-base for GraphCodeBERT
  add_func_tokens: true                    # required: enables func_input_ids in Data objects
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 11           # 10 CWE categories + benign (class 0)
  mil_weight: 0.5
  mil_k: 3
  rank_loss_weight: 0.2

train:
  seed: 42
  epochs: 100
  batch_size: 4             # reduced from 6: live CodeBERT + 11-class adds VRAM
  lr: 0.001
  lm_lr: 0.00002
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
