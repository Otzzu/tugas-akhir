# configs/lmgat_codebert/multiclass_unixcoder_f1stop.yaml
# Arch3 v4 replica (UniXcoder live) with F1-based early stopping.
# Only change vs original Arch3 v4: early_stop_metric=f1, patience=25.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_codebert/multiclass_unixcoder_f1stop.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 11
  mil_weight: 0.5
  mil_k: 3
  rank_loss_weight: 0.2

train:
  seed: 42
  epochs: 100
  batch_size: 16
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: false
  device: cuda
