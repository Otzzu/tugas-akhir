# configs/lmgat_hcdfgat/multiclass.yaml — HC-DFGAT (Arch11 Defense-Safe)
#
# Architecture: Dual-flow GATv2 + live UniXcoder + 3 MTL heads
#   Stage 1: localization GNN → suspicion s_i per node (stmt MIL / ranking)
#   Stage 2: classification GNN(x + s_i) → focal_emb + context_emb
#   Stage 3: UniXcoder CLS → lm_emb
#   Z_combined = concat(focal, context, lm)  [B, 1280]
#   Heads: binary_head, group_head (coarse), cwe_head (fine, conditioned on group)
#
# Losses:
#   LIVABLE_CE(cwe)
#   + group_loss_weight  * CE(group)
#   + binary_loss_weight * CE(binary)
#   + mil_weight         * MIL(stmt_scores)
#   + rank_loss_weight   * RankLoss(stmt_scores)    [requires flaw_line_mask]
#   + supcon_weight      * HierarchicalSupCon(Z_combined)
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_hcdfgat/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/codebert-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11        # fine-grained: top-10 CWE + benign
  num_groups: 16         # coarse: 15 CWE groups + benign
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.0  # set >0 only when flaw_line_mask is available (BigVul/MegaVul)
  group_loss_weight: 0.3
  binary_loss_weight: 0.2
  supcon_weight: 0.1        # HierarchicalSupConLoss on Z_combined
  supcon_temperature: 0.07
  supcon_alpha: 0.5         # soft-positive weight for same-group, diff-CWE pairs

train:
  seed: 42
  epochs: 100
  batch_size: 12
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 20
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true      # LIVABLE epoch-adaptive class weights
  device: cuda
