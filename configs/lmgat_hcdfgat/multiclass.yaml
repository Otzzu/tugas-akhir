# configs/lmgat_hcdfgat/multiclass.yaml — HC-DFGAT (Arch12) best config
#
# Architecture: Dual-flow GATv2 + live UniXcoder + 3 MTL heads
#   Stage 1: localization GNN → suspicion s_i per node (stmt MIL / ranking)
#   Stage 2: classification GNN(x + s_i) → focal_emb + context_emb
#   Stage 3: UniXcoder CLS → lm_emb  (func_lm; pretrained_lm is fallback only)
#   Z_combined = concat(focal, context, lm)  [B, 1280]
#   Heads: binary_head, group_head (coarse, 16 classes), cwe_head (fine, 11 classes)
#   group_id: 7 active groups in dataset (0,1,2,3,4,6,9); num_groups=16 matches GROUP_VOCAB
#
# Best settings applied:
#   - LIVABLE epoch-adaptive class weights (epoch-adaptive → stable class balance)
#   - early_stop_metric=f1  (Arch3 v5: loss-stop was main bottleneck; +0.26 F1 gain)
#   - patience=25           (match Arch3 v5)
#   - rank_loss_weight=0.1  (BigVul has flaw_line_mask → enable ranking supervision)
#   - mil_weight=0.5        (Arch3 v5 best)
#   - focal_loss_gamma=2.0  (imbalanced multiclass)
#   - group_loss_weight=0.3 + supcon_weight=0.1 (HC-DFGAT coarse→fine routing)
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_hcdfgat/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base  # fallback only; func_lm overrides
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11        # fine-grained: top-10 CWE + benign
  num_groups: 16         # coarse: 15 CWE groups + benign (GROUP_VOCAB has 16 entries)
  use_group_cond: true   # CWE head conditioned on group_probs; group_id available in dataset
  mil_weight: 0.5        # increased from 0.3 (Arch3 v5 best)
  mil_k: 3
  rank_loss_weight: 0.2  # enabled: BigVul has flaw_line_mask
  group_loss_weight: 0.3
  binary_loss_weight: 0.2
  supcon_weight: 0.1
  supcon_temperature: 0.07
  supcon_alpha: 0.5                  # same-group fallback weight (always used)
  supcon_use_distance_matrix: false  # true → load cwe_dist_matrix for continuous weights
  # --- distance-matrix options (only active when supcon_use_distance_matrix: true) ---
  # cwe_dist_matrix: data/cwe/cwe_distance_matrix.json
  # supcon_weight_fn: linear         # linear | exp | power
  # supcon_exp_scale: 5.0
  # supcon_power: 2.0
  # supcon_min_weight: 0.0
  add_self_loops: false
  use_skip: false
  use_edge_emb: false

train:
  seed: 42
  epochs: 100
  batch_size: 12
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
