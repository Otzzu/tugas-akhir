# configs/lmgat/top1_cwe.yaml — Binary-like: benign vs top-1 CWE (CWE-119)
#
# top_cwe: 1 keeps vocab entries with id <= 1 → benign (0) + CWE-119 (1)
# Classes are naturally balanced so no class weights / focal loss needed.
# A fresh .pt is built from existing CPG files — no Joern re-run needed.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat/top1_cwe.yaml

data:
  source: bigvul
  mode: multiclass
  top_cwe: 1
  max_nodes: 1000

model:
  architecture: lmgat
  pretrained_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 2
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.1

train:
  seed: 42
  epochs: 100
  batch_size: 12
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 20
  use_class_weights: false
  focal_loss_gamma: 0.0
  device: cuda
  save_last_every: 10
