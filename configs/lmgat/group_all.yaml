# configs/lmgat/group_all.yaml — Group-level classification: benign + all 15 CWE groups
#
# mode: group  → y = contiguous group ID (0=benign, 1..15 = groups present, remapped)
# 16 classes total: benign + 15 groups (incl. small ones: logging_and_alerting_failures=1, software_or_data_integrity_failures=5)
# use_class_weights: true — critical for severe imbalance (memory_safety 3618 vs logging_and_alerting_failures 1)
# focal_loss_gamma: 2.0 — extra focus on rare groups
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat/group_all.yaml

data:
  source: bigvul
  mode: group
  max_nodes: 1000

model:
  architecture: lmgat
  pretrained_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 18
  num_classes: 16
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.1

train:
  seed: 42
  epochs: 100
  batch_size: 12
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 20
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: false       # set true to use LIVABLE epoch-adaptive weights instead of static
  device: cuda
  save_last_every: 10
