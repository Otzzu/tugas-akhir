# configs/lmgat/multiclass_unixcoder_livable.yaml — LM-GAT + frozen UniXcoder + LIVABLE
#
# Base lmgat architecture (pre-computed node features, GATv2Conv, no live LM).
# UniXcoder embeddings (768D) via lm_dataset_bigvul_multiclass_unixcoder-base_ft_top10.pt.
# Adds: LIVABLE epoch-adaptive class weights, F1 early stop, focal loss.
#
# Loss = LIVABLE_CE(cwe) + mil_weight * MIL(stmt_scores) + rank_loss_weight * RankLoss
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat/multiclass_unixcoder_livable.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat
  pretrained_lm: microsoft/unixcoder-base
  add_func_tokens: true          # selects _ft_top10.pt dataset; func tokens unused by lmgat
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 11                # 10 CWE + benign
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2

train:
  seed: 42
  epochs: 100
  batch_size: 32                 # RTX 5070 Ti 16GB: no live LM but safe default; bump to 48 if no OOM
  lr: 0.001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  save_last_every: 10
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
