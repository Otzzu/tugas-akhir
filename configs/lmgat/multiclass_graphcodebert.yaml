# configs/lmgat/multiclass_graphcodebert.yaml — LM-GAT + frozen GraphCodeBERT embeddings
#
# Same as lmgat/multiclass.yaml but node embeddings from GraphCodeBERT
# (data-flow-aware) instead of plain CodeBERT.
# add_func_tokens: true — reuses existing graphcodebert-base_ft.pt on cloud.
# LM-GAT ignores func_input_ids during training; field just unused.
#
# Run:
#   uv run train --config configs/lmgat/multiclass_graphcodebert.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000

model:
  architecture: lmgat
  pretrained_lm: microsoft/graphcodebert-base
  add_func_tokens: true           # reuse _ft processed file; func tokens unused by lmgat
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 11
  mil_weight: 0.5
  mil_k: 3
  rank_loss_weight: 0.2

train:
  seed: 42
  epochs: 100
  batch_size: 64
  lr: 0.003                       # scaled ~3x from batch 6→64 (conservative)
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
  save_last_every: 10
