# configs/lmgin/multiclass.yaml — Architecture 5: LM-GIN (Graph Isomorphism Network)
#
# GINEConv (edge-aware GIN) + frozen CodeBERT node embeddings.
# GIN is theoretically more expressive than GCN/GAT for graph isomorphism.
# Uses sum aggregation: h = MLP((1+ε)*h_v + Σ h_u + e_uv)
#
# Run:
#   uv run train --config configs/lmgin/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  top_cwe: 10
  max_nodes: 1000

model:
  architecture: lmgin
  pretrained_lm: microsoft/codebert-base
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  num_classes: 11
  mil_weight: 0.5
  mil_k: 3
  rank_loss_weight: 0.2

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
