# configs/lmgat_codebert/multiclass_mtl_supcon.yaml — MTL + LIVABLE + HierarchicalSupCon
#
# Extends multiclass_mtl_livable_f1stop.yaml with HierarchicalSupConLoss on fused embedding.
# fused = concat(h_graph, cls)  [B, hidden_dim + 768]  — pre-head representation.
#
# Loss = LIVABLE_CE(cwe)
#      + group_loss_weight * CE(group)
#      + binary_loss_weight * CE(binary)
#      + mil_weight * MIL(stmt_scores)
#      + rank_loss_weight * RankLoss
#      + supcon_weight * HierarchicalSupCon(fused, cwe_labels, group_ids)
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_codebert/multiclass_mtl_supcon.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert_mtl
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 11         # fine-grained: 10 CWE + benign
  num_groups: 16          # coarse: 15 CWE groups + benign
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  use_group_cond: true
  group_loss_weight: 0.3
  binary_loss_weight: 0.2
  active_heads: [binary, group, cwe]
  add_self_loops: false
  use_skip: false
  use_edge_emb: false
  supcon_weight: 0.1
  supcon_temperature: 0.07
  supcon_alpha: 0.5                  # same-group fallback weight
  supcon_use_distance_matrix: false  # true → continuous weights via CWE tree distance

train:
  seed: 42
  epochs: 100
  batch_size: 20  # SupCon O(B^2) is small; no edge emb leaves headroom
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  save_last_every: 10  # 0=never save last.pt (no resume); N=every N epochs
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
