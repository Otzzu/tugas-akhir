# configs/lmgat_codebert_mtl/multiclass_mtl_codet5p_220m.yaml — Arch11 v3 recipe + CodeT5+-220m
#
# Base: Arch11 v3 best (F1=0.6819, IFA=4.60, Effort=0.0338)
# Change: func_lm = Salesforce/codet5p-220m (standard T5 enc-dec, ~1024D encoder output)
#
# codet5p-220m is a standard T5 encoder-decoder — NOT the embedding model.
# lm_pool uses mean-pool over encoder last_hidden_state (T5-like path).
# lm_dim = d_model of the T5 encoder (auto-detected at model init).
# T5 relative-position bias overflows under fp16/bf16 AMP → NaN loss.
# Fix: lm_pool forces float32 for T5 encoder forward (autocast disabled internally).
#
# lm_lr lowered to 5e-6 (220m larger model, more conservative ft).
# batch_size=8 (larger model, more VRAM).
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train \
#     --config configs/lmgat_codebert_mtl/multiclass_mtl_codet5p_220m.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert_mtl
  pretrained_lm: microsoft/unixcoder-base
  func_lm: Salesforce/codet5p-220m
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 18
  num_classes: 11
  num_groups: 16
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  use_group_cond: true
  group_loss_weight: 0.3
  binary_loss_weight: 0.2
  active_heads: [binary, group, cwe]
  add_self_loops: false
  use_skip: false
  use_edge_emb: false

train:
  seed: 42
  epochs: 100
  batch_size: 8               # 220m larger — reduce batch to avoid OOM
  lr: 0.001
  lm_lr: 0.000005             # lower than 110m-emb: 220m more sensitive
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
  save_last_every: 10
