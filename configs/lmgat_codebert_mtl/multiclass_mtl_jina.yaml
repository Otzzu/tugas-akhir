# configs/lmgat_codebert_mtl/multiclass_mtl_jina.yaml — Arch11 v3 recipe + Jina func_lm
#
# Base: Arch11 v3 best (F1=0.6819, IFA=4.60, Effort=0.0338)
#   use_group_cond=true, group_loss=0.3, rank=0.2, LIVABLE, F1-stop
# Change: func_lm = jinaai/jina-code-embeddings-0.5b (768D, Matryoshka-capable)
#
# pretrained_lm (node embeddings) stays microsoft/unixcoder-base — matches existing .pt.
# matryoshka_dim: null → uses full 768D output (same dim as UniXcoder — fair comparison).
# Set matryoshka_dim: 512 to reduce memory if OOM.
#
# No structural mods (no self_loops/skip/edge_emb) — isolates LM-swap effect vs v3.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train \
#     --config configs/lmgat_codebert_mtl/multiclass_mtl_jina.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert_mtl
  pretrained_lm: microsoft/unixcoder-base
  func_lm: jinaai/jina-code-embeddings-0.5b
  add_func_tokens: true
  matryoshka_dim: null    # Jina Matryoshka: truncate output to 512D to reduce LM activation peak
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 11
  num_groups: 16
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  use_group_cond: true
  group_loss_weight: 0.3
  binary_loss_weight: 0.2
  active_heads: [binary, group, cwe]
  add_self_loops: false
  use_skip: false
  use_edge_emb: false

train:
  seed: 42
  epochs: 100
  batch_size: 4    # reduced from 10 — Jina decoder OOM fix (causal attn is O(seq²) × B)
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
  save_last_every: 10
