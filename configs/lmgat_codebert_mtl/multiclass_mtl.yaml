# configs/lmgat_codebert/multiclass_mtl.yaml — MTL: binary + group + CWE heads
#
# Three output heads on shared GATv2 + live UniXcoder encoder:
#   1. binary_head  — safe vs. vuln  (binary_loss_weight)
#   2. group_head   — coarse CWE family  (group_loss_weight)
#   3. cwe_head     — fine-grained CWE, conditioned on detached group probs
#
# Loss = LIVABLE_CE(cwe) + group_loss_weight * CE(group) + binary_loss_weight * CE(binary)
#      + mil_weight * MIL(stmt_scores)
#
# Requires Data objects with:
#   batch.y        — CWE class ID (0=benign)
#   batch.group_id — group class ID (0=benign)
#
# Tuned for RTX 4090 24GB.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_codebert/multiclass_mtl.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert_mtl
  pretrained_lm: microsoft/unixcoder-base  # must match PT: lm_dataset_bigvul_multiclass_unixcoder-base_ft_top10.pt
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 11        # fine-grained: 10 CWE + benign
  num_groups: 16         # coarse: 15 CWE groups + benign
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.0  # set >0 only with flaw_line_mask (BigVul/MegaVul)
  use_group_cond: false    # false = no group PT; cwe_head gets zeros instead of random group probs
  group_loss_weight: 0.0  # 0.0 = no group_id in existing PT; set >0 only with group-mode PT
  binary_loss_weight: 0.2  # binary label derived from batch.y > 0, always available
  active_heads: [binary, cwe]

train:
  seed: 42
  epochs: 100
  batch_size: 20                # RTX 4090 24GB: single GATv2 stack; reduce to 12 if OOM
  lr: 0.001
  lm_lr: 0.00001                # AdamW separate LR for UniXcoder branch
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: false           # disabled; enable for LIVABLE adaptive weights run
  device: cuda
  save_last_every: 10
