# configs/lmgat_codebert/multiclass_mtl_edge_emb.yaml — Ablation: edge embeddings only
#
# Arch11 v7: adds use_edge_emb=true over the base MTL (v3).
# No self-loops, no skip. Isolates contribution of hierarchical edge embeddings alone.
# Contrast with v4 (self_loops+skip, no edge_emb) and v5 (all three).
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_codebert/multiclass_mtl_edge_emb.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_codebert_mtl
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11
  num_groups: 16
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  use_group_cond: true
  group_loss_weight: 0.3
  binary_loss_weight: 0.2
  active_heads: [binary, group, cwe]
  add_self_loops: false
  use_skip: false
  use_edge_emb: true
  edge_emb_dim: 32
  edge_coarse_dim: 16

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  save_last_every: 10
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
  
