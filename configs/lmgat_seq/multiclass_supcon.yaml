# configs/lmgat_seq/multiclass_supcon.yaml — Arch7 v1 best recipe + SupCon
#
# Base: Arch7 v1 best (F1=0.6897, AUC=0.9041, IFA=6.88, Effort=0.0567)
#   stage2=raw, mil=0.3, rank=0.1, lr=0.001, LIVABLE, F1-stop
# Adds: use_supcon=true (supcon applied to z = concat(graph_emb, lm_emb))
#
# Note: Arch7 z is from Stage 2 cls repr + LM — shared with localization gradient path.
# SupCon may conflict with MIL (watch IFA/Top-1 vs Arch7 v1 best as reference).
# If localization degrades, disable supcon or reduce supcon_weight to 0.05.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train \
#     --config configs/lmgat_seq/multiclass_supcon.yaml

data:
  source: bigvul
  mode: multiclass
  top_cwe: 10
  max_nodes: 1000

model:
  architecture: lmgat_seq
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11
  stage2_node_input: raw
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.1
  use_supcon: true
  supcon_weight: 0.1
  supcon_temperature: 0.07
  supcon_alpha: 0.5

train:
  seed: 42
  epochs: 100
  batch_size: 8
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
