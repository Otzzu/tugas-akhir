# configs/lmgat_seq/multiclass.yaml — Architecture 7: Sequential Localization → Classification
#
# Stage 1: GATv2 binary localization → per-node suspicion score s_i
# Stage 2: GATv2(concat[x_raw, s_i]) + live LM → CWE classification
# MIL loss: binary BCE on stage-1 statement scores (top-k)
# Ranking loss: pushes suspicious lines above benign lines in vulnerable functions
#
# pretrained_lm: frozen node embedder — MUST match processed .pt on cloud (unixcoder)
# func_lm: live fine-tuned LM for Stage 2 function branch (unixcoder, already on cloud)
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_seq/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  top_cwe: 10
  max_nodes: 1000

model:
  architecture: lmgat_seq
  pretrained_lm: microsoft/unixcoder-base      # must match dataset .pt
  func_lm: microsoft/unixcoder-base            # live LM branch (already on cloud)
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11
  stage2_node_input: raw        # Stage 2 GNN gets original 773D + s_i (preserves raw signal)
  mil_weight: 0.3               # binary BCE MIL on stage-1 stmt scores
  mil_k: 3
  rank_loss_weight: 0.1         # ranking loss (binary stmt head -- pushes vuln lines above benign)

train:
  seed: 42
  epochs: 100
  batch_size: 8                 # 2x GATv2 stacks + live LM; RTX 4090 24GB
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
