# Phase 1 — A4-fix: lmgat_codebert, localization=both, fixed loss stack
# Best phase1 config for macro-F1 (test f1_macro=0.519, AUC=0.915).
# Changes from A4 baseline:
#   - focal removed (was causing triple-stacking)
#   - label_smoothing=0.1 (prevents overconfidence)
#   - weight_decay=0.001 (stronger regularization for LM)
#   - lr_scheduler=cosine (smooth decay)
#   - patience=15 (stop earlier)
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase3/C1_loss_nofocal.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  localization_encoder: both
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.001
  patience: 15
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 0.0
  epoch_adaptive_weights: true
  label_smoothing: 0.1
  lr_scheduler: cosine
  device: cuda
  use_amp: true
  use_flash_attention: true
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
