# Phase 6 — F7: func=CodeT5+ with normalized per-token AND normalized GNN output
# Same as F6 but also applies F.normalize(dim=-1) to h_graph before concat.
# F6: h_graph raw | lm_emb unit-norm 256-dim → [raw_256 | norm_256]
# F7: h_graph unit-norm | lm_emb unit-norm 256-dim → [norm_256 | norm_256]
# Tests whether GNN/LM scale imbalance (not just dim ratio) governs localization.
#
# .pt build: same as F3/F6 — configs/data/megavul_multiclass_top25_node-unixcoder_func-codet5p.yaml
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase6/F7_node-unixcoder_func-codet5p-both-normed.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  live_lm: func
  pretrained_lm: microsoft/unixcoder-base            # node LM (same as F3/F6)
  func_lm: Salesforce/codet5p-110m-embedding         # func LM (same as F3/F6)
  codet5p_normalize_per_token: true                  # normalize per_token to unit norm (same as F6)
  normalize_gnn_output: true                         # normalize h_graph to unit norm before concat
  add_func_tokens: true
  func_max_length: 512
  localization_encoder: both
  stmt_both_mode: concat
  graph_pool: meanmax
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.001
  patience: 15
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 0.0
  epoch_adaptive_weights: true
  livable_loss: false
  label_smoothing: 0.1
  lr_scheduler: cosine
  device: cuda
  use_amp: true
  use_flash_attention: false
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
