# Phase 4 — D3: A4-L1 base + dualflow graph pool.
# Base: A4-L1 (Phase 3 winner — no focal + label_smoothing + epoch_adaptive).
# Varies: graph_pool = dualflow.
#   - Per-node suspicion head: s_i = sigmoid(Linear(h_i))
#   - focal pool   = Σ(h·s) / Σ s   (suspicion-weighted average)
#   - context pool = global_mean_pool
#   - h_graph = focal + context   (sum, keeps hidden dim)
# Single-encoder version of lmgat_dualflow's dual-pooling — no two-stage GNN.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase4/D3_pool_dualflow.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  localization_encoder: both
  stmt_both_mode: concat
  graph_pool: dualflow
  cross_task_method: none
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.001
  patience: 15
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 0.0
  epoch_adaptive_weights: true
  livable_loss: false
  label_smoothing: 0.1
  lr_scheduler: cosine
  device: cuda
  use_amp: true
  use_flash_attention: true
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
