# Phase 7 — G1: GNN dim=256, UniXcoder func_lm dim=768 → fused=1024, GNN 25% / LM 75%
# Reference baseline = Phase 4 D2 (meanmax). EXISTING RUN: 20260516_125619.
# No re-run needed — use D2 results directly.
#
# dim breakdown:
#   h_graph:  256 (hidden_dim)
#   lm_emb:   768 (UniXcoder CLS)
#   fused:   1024 → GNN 25%, LM 75%
#
# .pt build: configs/data/megavul_multiclass_top25_node-unixcoder_func-unixcoder.yaml
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase7/G1_dim256_baseline.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  localization_encoder: both
  stmt_both_mode: concat
  graph_pool: meanmax
  cross_task_method: none
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.001
  patience: 15
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 0.0
  epoch_adaptive_weights: true
  livable_loss: false
  label_smoothing: 0.1
  lr_scheduler: cosine
  device: cuda
  use_amp: true
  use_flash_attention: true
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
