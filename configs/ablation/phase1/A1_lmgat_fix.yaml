# Phase 1 — A1-fix: lmgat (frozen), fixed loss stack
# Same as A1 but with:
#   - focal removed (was causing triple-stacking with livable + class_weights)
#   - label_smoothing=0.1 (prevents overconfidence, replaces focal's role)
#   - weight_decay=0.001 (stronger regularization)
#   - lr_scheduler=cosine (smooth decay, EDAT-style)
#   - patience=15 (stop earlier before val_loss explodes)
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase1/A1_lmgat_fix.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 64
  lr: 0.001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.001          # was 0.0001 — stronger regularization
  patience: 15                 # was 25 — stop earlier
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 0.0        # REMOVED — was causing triple-stacking
  livable_loss: true           # keep — adaptive weights over time
  label_smoothing: 0.1         # NEW — prevents overconfidence
  lr_scheduler: cosine         # NEW — smooth decay (EDAT-style)
  device: cuda
  use_amp: true
  use_flash_attention: false
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
