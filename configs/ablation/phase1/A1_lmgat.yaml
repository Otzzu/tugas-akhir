# Phase 1 — A1: lmgat (frozen UniXcoder node embeddings, no live func LM)
# Baseline: GATv2 + pre-computed node features only, no function-level LM branch.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase1/A1_lmgat.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42

model:
  architecture: lmgat
  pretrained_lm: microsoft/unixcoder-base
  add_func_tokens: true           # selects _ft dataset variant (same .pt as A2-A4)
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26                 # 25 Top-25 CWEs + benign
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 16                  # no live LM — larger batch OK
  lr: 0.001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  early_stop_metric: f1
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: true
  device: cuda
  use_amp: true
  use_flash_attention: false      # no LM branch
  grad_accum_steps: 1             # batch=16, effective=16
  save_last_every: 10
