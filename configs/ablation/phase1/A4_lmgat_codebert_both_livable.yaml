# Phase 1 — A4-livable: lmgat_codebert, localization=both, real LIVABLE loss
# Real LIVABLE two-branch loss (arXiv:2306.06935, Eq. 11-12):
#   L = T * focal + (1-T) * label_smooth_CE
#   T = 1 - (epoch/max_epoch)^2
# focal_gamma=2.0 and label_smoothing=0.1 used for the two branches.
# No epoch_adaptive_weights — LIVABLE loss handles rebalancing internally.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase1/A4_lmgat_codebert_both_livable.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  localization_encoder: both
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 75                     # T completes full cycle 1→0 in 75 epochs (~3.4 hrs)
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.001
  patience: 75                   # disabled — LIVABLE needs full T cycle to work correctly
  early_stop_metric: f1          # still saves best checkpoint by f1
  use_class_weights: false       # LIVABLE handles rebalancing — no separate class weights
  focal_loss_gamma: 2.0          # used by LIVABLE focal branch
  epoch_adaptive_weights: false  # not needed — LIVABLE replaces this
  livable_loss: true             # REAL LIVABLE (arXiv:2306.06935, Eq. 11-12)
  label_smoothing: 0.1           # used by LIVABLE LSCE branch
  lr_scheduler: cosine
  device: cuda
  use_amp: true
  use_flash_attention: true
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
