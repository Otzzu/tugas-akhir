# Phase 1 — A4-opt2: lmgat_codebert, localization=both, drop focal only
# Same as A4 baseline but ONLY drops focal loss.
# Purpose: isolate whether focal alone was the problem (everything else original).
# This tests the LIVABLE paper Table 2 hypothesis: class-balanced focal is the worst row.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/ablation/phase1/A4_lmgat_codebert_both_opt2.yaml

data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  filter_top25_dangerous: true
  filter_owasp: false
  max_per_class: 1600
  resample_seed: 42
  storage: lazy

model:
  architecture: lmgat_codebert
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  localization_encoder: both
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 26
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.2
  add_self_loops: false
  use_skip: false

train:
  seed: 42
  epochs: 100
  batch_size: 32
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001         # original
  patience: 25                 # original
  early_stop_metric: f1
  use_class_weights: true      # original
  focal_loss_gamma: 0.0        # ONLY DIFFERENCE FROM A4 baseline — was 2.0
  epoch_adaptive_weights: true           # original
  label_smoothing: 0.0         # original
  lr_scheduler: plateau        # original
  device: cuda
  use_amp: true
  use_flash_attention: true
  grad_accum_steps: 1
  save_last_every: 10
  compile_model: false
  stmt_head_vectorized: true
  num_workers: 8
  prefetch_factor: 2
