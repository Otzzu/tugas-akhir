data:
  source: bigvul
  mode: multiclass
  max_nodes: 3600
  top_cwe: 0
  max_per_class: 1200
  resample_seed: 42
  filter_top25: true
  filter_owasp_top10: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: jinaai/jina-code-embeddings-0.5b
  add_func_tokens: true
  num_classes: 85   # len(data/raw/bigvul/cwe_vocab.json)
  num_groups: 16
  matryoshka_dim: 512

train:
  device: cuda
