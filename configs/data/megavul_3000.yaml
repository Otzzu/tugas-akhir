# configs/lmgat_hcdfgat/megavul_3000.yaml
data:
  source: megavul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 999
  max_per_class: 3000
  resample_seed: 42

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  num_classes: 155
  num_groups: 16
