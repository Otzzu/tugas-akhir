# configs/lmgat_hcdfgat/megavul_group_3000.yaml
data:
  source: megavul
  mode: multiclass       
  max_nodes: 2700
  top_cwe: 0       
  max_per_class: 2100   
  resample_seed: 42
  filter_owasp: true
  filter_top25_dangerous: false


model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  num_classes: 155  
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda

train:
  use_flash_attention: true
  compile_model: true
