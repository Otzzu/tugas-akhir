data:
  source: megavul
  mode: multiclass
  max_nodes: 2700
  top_cwe: 0
  max_per_class: 1300
  resample_seed: 42
  filter_top25_dangerous: false
  filter_owasp: true

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: Salesforce/codet5p-110m-embedding
  func_lm: Salesforce/codet5p-110m-embedding
  add_func_tokens: true
  func_max_length: 1024
  num_classes: 95  # 94 OWASP-filtered MegaVul CWEs + benign
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda
  use_flash_attention: true
  use_amp: false
  compile_model: true
