data:
  source: bigvul
  mode: multiclass
  max_nodes: 3600
  top_cwe: 0
  max_per_class: 1200
  resample_seed: 42
  filter_top25_dangerous: false
  filter_owasp: true

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: Salesforce/codet5p-110m-embedding
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  num_classes: 47  # OWASP-filtered BigVul CWEs + benign
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda

train:
  use_flash_attention: true
  use_amp: false
  compile_model: true
