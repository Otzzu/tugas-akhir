data:
  source: bigvul
  mode: multiclass
  max_nodes: 3600
  top_cwe: 0
  max_per_class: 1200
  resample_seed: 42
  filter_top25_dangerous: true
  filter_owasp: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  num_classes: 20   # len(data/raw/bigvul/cwe_vocab.json)
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda

train:
  use_flash_attention: true
  compile_model: true
