data:
  source: titanvul
  mode: multiclass
  max_nodes: 3400
  top_cwe: 10
  max_per_class: 1500
  resample_seed: 42
  filter_top25_dangerous: false
  filter_owasp: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: Salesforce/codet5p-110m-embedding
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  num_classes: 11
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda
  use_flash_attention: false
  use_amp: false
  compile_model: true
