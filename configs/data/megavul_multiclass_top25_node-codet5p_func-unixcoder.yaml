data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  max_per_class: 1600
  resample_seed: 42
  filter_top25_dangerous: true
  filter_owasp: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: Salesforce/codet5p-110m-embedding
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  func_max_length: 1024
  num_classes: 26  # 25 Top-25 CWEs present in MegaVul + benign
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda
  use_flash_attention: true
  use_amp: false
  compile_model: true
