data:
  source: megavul
  mode: multiclass
  max_nodes: 2500
  top_cwe: 0
  max_per_class: 2300
  resample_seed: 42
  filter_top25_dangerous: true
  filter_owasp: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: jinaai/jina-code-embeddings-0.5b
  add_func_tokens: true
  num_classes: 155
  num_groups: 16
  active_heads: [binary, group, cwe]
  matryoshka_dim: 512

train:
  device: cuda
  use_flash_attention: true
  compile_model: true
