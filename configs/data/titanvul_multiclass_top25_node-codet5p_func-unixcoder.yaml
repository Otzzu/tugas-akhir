data:
  source: titanvul
  mode: multiclass
  max_nodes: 3400
  top_cwe: 0
  max_per_class: 1500
  resample_seed: 42
  filter_top25_dangerous: true
  filter_owasp: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: Salesforce/codet5p-110m-embedding
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  num_classes: 775
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda

train:
  use_flash_attention: true
  use_amp: false
  compile_model: true
