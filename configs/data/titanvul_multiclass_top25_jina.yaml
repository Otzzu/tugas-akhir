data:
  source: titanvul
  mode: multiclass
  max_nodes: 3400
  top_cwe: 0
  max_per_class: 1500
  resample_seed: 42
  filter_top25: true
  filter_owasp_top10: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: jinaai/jina-code-embeddings-0.5b
  add_func_tokens: true
  num_classes: 775
  num_groups: 16
  matryoshka_dim: 512

train:
  device: cuda
