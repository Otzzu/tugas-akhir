data:
  source: titanvul
  mode: group
  max_nodes: 3400
  top_cwe: 0
  max_per_class: 4500
  resample_seed: 42
  filter_top25_dangerous: true
  filter_owasp: false

model:
  architecture: lmgat_hcdfgat
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  num_classes: 7
  num_groups: 16
  active_heads: [binary, group, cwe]

train:
  device: cuda
