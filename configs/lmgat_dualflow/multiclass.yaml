# configs/lmgat_dualflow/multiclass.yaml — Architecture 10: LM-GAT-DualFlow
#
# Stage 1: GATv2 binary localization → s_i  (Arch7 v1 engine)
# Stage 2: GATv2(x + s_i) → h_cls → focal_emb (suspicion-weighted) + context_emb (mean)
# Stage 3: concat(focal, context, lm_cls) → CWE head
#
# Hypothesis: Arch7 v1 drops F1 because suspicion-weighted pool discards safe-context nodes.
# DualFlow restores context_emb alongside focal_emb so classifier sees full structural layout.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_dualflow/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  top_cwe: 10
  max_nodes: 1000

model:
  architecture: lmgat_dualflow
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 7
  num_classes: 11
  mil_weight: 0.3               # binary BCE MIL on stage-1 stmt scores
  mil_k: 3
  rank_loss_weight: 0.1         # ranking loss on stage-1 stmt scores

train:
  seed: 42
  epochs: 100
  batch_size: 6                 # two GATv2 stacks + live LM; 1280D fusion slightly heavier than Arch7
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 20
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
