# configs/lmgat_dualflow/multiclass.yaml — Architecture 10: LM-GAT-DualFlow
#
# Stage 1: GATv2 binary localization → s_i  (Arch7 v1 engine)
# Stage 2: GATv2(x + s_i) → h_cls → focal_emb (suspicion-weighted) + context_emb (mean)
# Stage 3: concat(focal, context, lm_cls) [1280D] → CWE head
#
# Tuned for RTX 4090 24GB.
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmgat_dualflow/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  top_cwe: 10
  max_nodes: 1000

model:
  architecture: lmgat_dualflow
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  edge_dim: 31
  num_classes: 11
  mil_weight: 0.3               # binary BCE MIL on stage-1 stmt scores
  mil_k: 3
  rank_loss_weight: 0.1         # pairwise ranking loss — requires flaw_line_mask (BigVul/MegaVul only)

train:
  seed: 42
  epochs: 100
  batch_size: 12                # RTX 4090 24GB: two GATv2 stacks + UniXcoder; reduce to 8 if OOM
  lr: 0.001
  lm_lr: 0.00001                # AdamW separate LR for UniXcoder branch
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 25
  use_class_weights: true
  focal_loss_gamma: 2.0
  livable_loss: false           # set true to enable LIVABLE epoch-adaptive class weights
  device: cuda
  save_last_every: 10
