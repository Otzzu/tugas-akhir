# configs/lmgat_waves_seq/multiclass.yaml — Architecture 8: WAVES Localization → VulLMGNN Classification
#
# Stage 1: Transformer encoder over statement embeddings (CodeBERT slice from frozen 773D node features)
#          → per-statement suspicion score via MIL binary loss
# Stage 2: GNN branch (773D + s_i = 774D) + live LM branch → CWE head
#
# Run:
#   uv run train --config configs/lmgat_waves_seq/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmgat_waves_seq
  pretrained_lm: microsoft/codebert-base    # node embedder LM (frozen, preprocessing)
  func_lm: microsoft/unixcoder-base         # live LM for function branch (fine-tuned)
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 4
  dropout: 0.3
  heads: 4
  num_classes: 11
  mil_weight: 0.3           # Stage 1 localization loss weight
  mil_k: 3
  rank_loss_weight: 0.0
  stmt_transformer_layers: 2
  stmt_transformer_heads: 4

train:
  seed: 42
  epochs: 100
  batch_size: 4
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
