# configs/lmggnn/multiclass.yaml — Architecture 9: LM-GGNN
#
# Arch3 (lmgat_codebert) with GATv2Conv replaced by GatedGraphConv × 6.
# Fusion: concat(pool(h_gnn), lm_cls) → func_head (same as Arch3).
# Statement head: binary per-line scorer + MIL loss (same as Arch3).
#
# Run (cloud, Linux):
#   PYTHONPATH=src python -m gnn_vuln.train --config configs/lmggnn/multiclass.yaml

data:
  source: bigvul
  mode: multiclass
  max_nodes: 1000
  top_cwe: 10

model:
  architecture: lmggnn
  pretrained_lm: microsoft/unixcoder-base
  func_lm: microsoft/unixcoder-base
  add_func_tokens: true
  hidden_dim: 256
  num_layers: 6
  dropout: 0.3
  num_classes: 11
  mil_weight: 0.3
  mil_k: 3
  rank_loss_weight: 0.1

train:
  seed: 42
  epochs: 100
  batch_size: 4                 # RTX 4060 8GB VRAM — GatedGraphConv×6 + live UniXcoder OOMs at 8
  lr: 0.001
  lm_lr: 0.00001
  warmup_ratio: 0.1
  grad_clip: 1.0
  weight_decay: 0.0001
  patience: 15
  use_class_weights: true
  focal_loss_gamma: 2.0
  device: cuda
